<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TR-8 AI Gen-Sequencer</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --accent: #00ff41; /* Roland Green */
            --text: #e0e0e0;
            --danger: #ff4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            user-select: none;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--panel);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
            display: inline-block;
            margin-right: 5px;
        }

        .status-active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        select, button {
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 5px;
            font-size: 14px;
        }

        .grid-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            background: var(--panel);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .btn-large {
            width: 100%;
            height: 60px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .btn-gen { border-color: var(--accent); color: var(--accent); }
        .btn-start { background: #222; border-color: #444; }
        .btn-active { background: var(--accent) !important; color: black; }

        .slider-container {
            margin: 15px 0;
        }

        label { display: block; font-size: 11px; margin-bottom: 5px; color: #888; }

        input[type=range] {
            width: 100%;
            height: 35px;
            appearance: none;
            background: #222;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 25px;
            height: 35px;
            background: var(--accent);
            cursor: pointer;
            border-radius: 3px;
        }

        .warning {
            font-size: 10px;
            color: orange;
            text-align: center;
            margin-top: 10px;
        }

        .step-indicator {
            display: flex;
            gap: 2px;
            margin-top: 5px;
        }

        .dot { width: 100%; height: 4px; background: #333; }
        .dot.active { background: var(--accent); }

        .snapshot-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        .btn-snap { font-size: 10px; padding: 8px 0; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <span id="midi-status" class="status-dot"></span>
        <small>TR-8 CONNECTED</small>
    </div>
    <select id="midi-out-select">
        <option>No MIDI Output</option>
    </select>
</div>

<div class="grid-main">
    <div class="card" style="grid-column: span 2;">
        <button id="start-btn" class="btn-large btn-start">START / STOP</button>
        <button id="gen-btn" class="btn-large btn-gen">GENERATE PATTERN</button>
        <div class="step-indicator" id="step-dots"></div>
    </div>

    <div class="card">
        <label>BD DECAY (CC 23)</label>
        <input type="range" min="0" max="127" value="64" class="cc-slider" data-cc="23">
        <label>SD SNAPPY (CC 26)</label>
        <input type="range" min="0" max="127" value="64" class="cc-slider" data-cc="26">
        <label>SCATTER DEPTH (CC 69)</label>
        <input type="range" min="0" max="127" value="0" class="cc-slider" data-cc="69">
    </div>

    <div class="card">
        <label>REV LEVEL (CC 91)</label>
        <input type="range" min="0" max="127" value="20" class="cc-slider" data-cc="91">
        <label>DEL LEVEL (CC 16)</label>
        <input type="range" min="0" max="127" value="0" class="cc-slider" data-cc="16">
        <label>BPM: <span id="bpm-val">120</span></label>
        <input type="range" min="60" max="180" value="120" id="bpm-slider">
    </div>
</div>

<div class="card" style="margin-top: 10px;">
    <label>SNAPSHOTS (SAVES PATTERN + CC)</label>
    <div class="snapshot-grid" id="snapshot-btns"></div>
</div>

<p class="warning">⚠️ HINWEIS: TR-8 auf "LOCAL CONTROL: OFF" stellen!</p>

<script>
    // --- KONFIGURATION ---
    const MIDI_CH = 9; // Kanal 10
    const NOTES = { BD:36, SD:38, LT:43, MT:47, HT:50, RS:37, HC:39, CH:42, OH:46, CC:49, RC:51 };
    
    let midiOut = null;
    let isPlaying = false;
    let bpm = 120;
    let currentStep = 0;
    let nextNoteTime = 0.0;
    let timerID = null;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Pattern Data: [Instrument][Step 0-15]
    let pattern = {};
    Object.keys(NOTES).forEach(k => pattern[k] = Array(16).fill(false));

    let snapshots = Array(8).fill(null);

    // --- MIDI INITIALISIERUNG ---
    navigator.requestMIDIAccess().then(access => {
        const outputs = Array.from(access.outputs.values());
        const select = document.getElementById('midi-out-select');
        
        outputs.forEach(out => {
            let opt = document.createElement('option');
            opt.value = out.id;
            opt.innerText = out.name;
            select.appendChild(opt);
        });

        select.onchange = () => {
            midiOut = access.outputs.get(select.value);
            document.getElementById('midi-status').classList.toggle('status-active', !!midiOut);
        };
        
        // Auto-select first
        if(outputs.length > 0) {
            select.value = outputs[0].id;
            select.onchange();
        }
    });

    function sendCC(cc, value) {
        if (!midiOut) return;
        midiOut.send([0xB0 | MIDI_CH, cc, value]);
    }

    function sendNote(note, velocity = 100) {
        if (!midiOut) return;
        midiOut.send([0x90 | MIDI_CH, note, velocity]);
        midiOut.send([0x80 | MIDI_CH, note, 0], window.performance.now() + 50);
    }

    // --- SEQUENCER ENGINE (High Precision) ---
    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            playStep(currentStep, nextNoteTime);
            advanceStep();
        }
        timerID = setTimeout(scheduler, 25);
    }

    function playStep(step, time) {
        const now = window.performance.now();
        const latency = (time - audioCtx.currentTime) * 1000;

        Object.keys(NOTES).forEach(key => {
            if (pattern[key][step]) {
                setTimeout(() => sendNote(NOTES[key], 110), latency);
            }
        });

        // UI Update
        requestAnimationFrame(() => {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === step));
        });
    }

    function advanceStep() {
        const secondsPerBeat = 60.0 / bpm;
        nextNoteTime += 0.25 * secondsPerBeat; // 16th notes
        currentStep = (currentStep + 1) % 16;
    }

    // --- GENERATIVE ALGORITHMUS ---
    function generatePattern() {
        Object.keys(pattern).forEach(inst => {
            for(let i=0; i<16; i++) {
                let threshold = 0.2; // Default sparse
                if(inst === 'CH') threshold = 0.6; // More HiHats
                if(inst === 'BD' && i % 4 === 0) threshold = 0.9; // Standard 4/4 Kick
                
                pattern[inst][i] = Math.random() < threshold;
            }
        });
    }

    // --- UI LOGIK ---
    const startBtn = document.getElementById('start-btn');
    startBtn.onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isPlaying = !isPlaying;
        startBtn.classList.toggle('btn-active', isPlaying);
        if (isPlaying) {
            currentStep = 0;
            nextNoteTime = audioCtx.currentTime;
            scheduler();
        } else {
            clearTimeout(timerID);
        }
    };

    document.getElementById('gen-btn').onclick = () => {
        generatePattern();
        // Visual Feedback
        document.getElementById('gen-btn').style.background = 'var(--accent)';
        setTimeout(() => document.getElementById('gen-btn').style.background = 'transparent', 100);
    };

    document.querySelectorAll('.cc-slider').forEach(slider => {
        slider.oninput = (e) => sendCC(parseInt(e.target.dataset.cc), parseInt(e.target.value));
    });

    document.getElementById('bpm-slider').oninput = (e) => {
        bpm = e.target.value;
        document.getElementById('bpm-val').innerText = bpm;
    };

    // UI: Step Dots erzeugen
    const dotContainer = document.getElementById('step-dots');
    for(let i=0; i<16; i++) {
        let d = document.createElement('div');
        d.className = 'dot';
        dotContainer.appendChild(d);
    }

    // Snapshot System
    const snapContainer = document.getElementById('snapshot-btns');
    for(let i=0; i<8; i++) {
        let b = document.createElement('button');
        b.className = 'btn-snap';
        b.innerText = 'SNAP ' + (i+1);
        b.onclick = () => {
            if(!snapshots[i]) {
                // Save
                const ccStates = Array.from(document.querySelectorAll('.cc-slider')).map(s => ({cc: s.dataset.cc, val: s.value}));
                snapshots[i] = { pattern: JSON.parse(JSON.stringify(pattern)), ccs: ccStates };
                b.style.borderColor = 'var(--accent)';
            } else {
                // Load
                pattern = snapshots[i].pattern;
                snapshots[i].ccs.forEach(state => {
                    const slider = document.querySelector(`[data-cc="${state.cc}"]`);
                    slider.value = state.val;
                    sendCC(state.cc, state.val);
                });
            }
        };
        snapContainer.appendChild(b);
    }

    generatePattern(); // Initial pattern
</script>
</body>
</html>
